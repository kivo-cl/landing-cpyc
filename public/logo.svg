<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 200 200">
  <defs>
    <!-- Top arc: counterclockwise left→right through the top, r=80 -->
    <path id="top-arc"    d="M 20,100 A 80,80 0 0 0 180,100"/>
    <!-- Bottom arc: counterclockwise right→left through the bottom, r=80 -->
    <path id="bottom-arc" d="M 180,100 A 80,80 0 0 0 20,100"/>
  </defs>

  <!-- Outer ring -->
  <circle cx="100" cy="100" r="95" fill="none" stroke="#1d1d1b" stroke-width="1.6"/>
  <!-- Inner ring -->
  <circle cx="100" cy="100" r="87" fill="none" stroke="#1d1d1b" stroke-width="0.8"/>

  <!-- CATERING curved top -->
  <text fill="#1d1d1b" font-family="'Helvetica Neue','Arial',sans-serif" font-size="9.5"
        font-weight="400" letter-spacing="5.5" text-anchor="middle">
    <textPath href="#top-arc" startOffset="50%">· C A T E R I N G ·</textPath>
  </text>

  <!-- Brand name -->
  <text x="100" y="91" text-anchor="middle" fill="#1d1d1b"
        font-family="'Arial Black','Arial',sans-serif"
        font-size="24" font-weight="900" letter-spacing="-0.5">CONTIGO</text>
  <text x="100" y="114" text-anchor="middle" fill="#1d1d1b"
        font-family="'Arial Black','Arial',sans-serif"
        font-size="19.5" font-weight="900" letter-spacing="-0.5">PAN &amp; CEBOLLA</text>

  <!-- EST. 2013 -->
  <text x="100" y="127" text-anchor="middle" fill="#1d1d1b"
        font-family="'Helvetica Neue','Arial',sans-serif"
        font-size="7" font-weight="400" letter-spacing="4">EST. 2013</text>

  <!-- Y COFFEE BREAK curved bottom -->
  <text fill="#1d1d1b" font-family="'Helvetica Neue','Arial',sans-serif" font-size="9"
        font-weight="400" letter-spacing="4" text-anchor="middle">
    <textPath href="#bottom-arc" startOffset="50%">· Y COFFEE BREAK ·</textPath>
  </text>
</svg>
